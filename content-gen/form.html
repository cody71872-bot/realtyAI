<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Content Generator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { padding: 0.75rem 1.5rem; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #218838; }
        .results { margin-top: 2rem; display: none; }
        .result-box { background: #f8f9fa; padding: 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; border-left: 4px solid #007bff; }
        .result-box h3 { margin-top: 0; color: #007bff; font-size: 1rem; text-transform: uppercase; }
        .result-box p { white-space: pre-wrap; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Listing Content Generator</h1>
        <form id="gen-form">
            <div class="form-group">
                <label>Property Address</label>
                <input type="text" id="address" placeholder="123 Ocean Ave, Malibu, CA" required>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" id="beds" value="3">
                </div>
                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" id="baths" value="2">
                </div>
                <div class="form-group">
                    <label>Listing Price</label>
                    <input type="text" id="price" placeholder="1,250,000">
                </div>
            </div>
            <div class="form-group">
                <label>Key Features (comma separated)</label>
                <textarea id="features" rows="3" placeholder="Ocean view, chef's kitchen, pool, newly renovated"></textarea>
            </div>
            <button type="submit" id="submit-btn">Generate Content</button>
        </form>

        <div id="results" class="results">
            <h2>Generated Content</h2>
            <div class="result-box">
                <h3>Instagram Caption</h3>
                <p id="res-caption"></p>
            </div>
            <div class="result-box">
                <h3>Story Script</h3>
                <p id="res-story"></p>
            </div>
            <div class="result-box">
                <h3>Newsletter Intro</h3>
                <p id="res-newsletter"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('gen-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Generating...';

            const data = {
                address: document.getElementById('address').value,
                beds: document.getElementById('beds').value,
                baths: document.getElementById('baths').value,
                price: document.getElementById('price').value,
                features: document.getElementById('features').value
            };

            try {
                const response = await fetch('/api/content/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                document.getElementById('res-caption').innerText = result.caption;
                document.getElementById('res-story').innerText = result.storyScript;
                document.getElementById('res-newsletter').innerText = result.newsletterIntro;
                
                document.getElementById('results').style.display = 'block';
            } catch (err) {
                console.error(err);
                alert('Generation failed.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Generate Content';
            }
        };
    </script>
</body>
</html>
